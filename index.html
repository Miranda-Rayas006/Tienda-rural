<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Tiendita Rural</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Menú Principal -->
    <div id="main-menu" class="screen active">
        <h1 class="title-bounce">La Tiendita Rural 🌽🏡</h1>
        <p class="subtitle">¡Aprende los números y monedas de nuestro pueblo!</p>
        <div class="menu-options">
            <button class="btn primary grade-btn" data-start="1">1° Grado<br><small>A Contar el Campo</small></button>
            <button class="btn secondary grade-btn" data-start="2">2° Grado<br><small>Conoce tus Monedas</small></button>
            <button class="btn accent grade-btn" data-start="3">3° Grado<br><small>Comprar en la Tienda</small></button>
        </div>
    </div>

    <!-- Pantalla de Grado 1 -->
    <div id="game-grade-1" class="screen">
        <header>
            <button class="btn back-btn">⬅ Volver</button>
            <h2>Contando en el Campo 🥚🍅</h2>
        </header>
        <div class="game-area">
            <div id="g1-items-container" class="items-area"></div>
            <p class="instruction">¿Cuántos objetos hay? ¡Toca para contar!</p>
            <div id="g1-options-container" class="options-area"></div>
        </div>
    </div>

    <!-- Pantalla de Grado 2 -->
    <div id="game-grade-2" class="screen">
        <header>
            <button class="btn back-btn">⬅ Volver</button>
            <h2>Las Monedas 🪙</h2>
        </header>
        <div class="game-area">
            <div id="g2-coin-display" class="coin-display"></div>
            <p class="instruction">¿Qué valor tiene esta moneda?</p>
            <div id="g2-options-container" class="options-area"></div>
        </div>
    </div>

    <!-- Pantalla de Grado 3 -->
    <div id="game-grade-3" class="screen">
        <header>
            <button class="btn back-btn">⬅ Volver</button>
            <h2>La Tiendita 🛒</h2>
        </header>
        <div class="game-area store-layout">
            <div class="product-area">
                <div id="g3-product" class="product-item"></div>
                <div class="price-tag" id="g3-price"></div>
            </div>
            <div class="wallet-area">
                <p class="instruction">Selecciona monedas para pagar. Llevas: $<span id="g3-current-amount">0</span></p>
                <div id="g3-wallet" class="wallet-coins">
                    <button class="coin btn-coin" data-val="1">$1</button>
                    <button class="coin btn-coin" data-val="2">$2</button>
                    <button class="coin btn-coin" data-val="5">$5</button>
                    <button class="coin btn-coin" data-val="10">$10</button>
                </div>
                <div class="action-buttons">
                    <button id="g3-clear" class="btn warning">Limpiar</button>
                    <button id="g3-buy" class="btn success">¡Comprar!</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pantalla de Celebración -->
    <div id="celebration-screen" class="screen overlay">
        <div class="celebration-box">
            <h1 class="bounce-in">¡Muy Bien! 🌟</h1>
            <p>¡Lo hiciste excelente!</p>
            <button id="next-btn" class="btn primary bounce">Siguiente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
